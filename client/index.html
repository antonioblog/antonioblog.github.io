    <!-- SPA redirect restore para GitHub Pages -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          var h = params.get('h');
          var url = window.location.pathname + p + (q ? '?' + q : '') + (h ? '#' + h : '');
          window.history.replaceState(null, null, url);
        }
      })();
    </script>
